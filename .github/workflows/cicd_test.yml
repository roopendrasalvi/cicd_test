name: Code Coverage Check

on:
  push:
    branches:
      - '**' 

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report -m fail under=90
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        
      
    
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 linting
        run: |
          # Fail if any linting errors are found
          flake8 . | tee lint.log

      - name: Save lint log
        run: |
          echo "<lint>" > lint.xml
          sed 's/^/<line>/' lint.log | sed 's/$/<\/line>/' >> lint.xml
          echo "</lint>" >> lint.xml
      - name: Upload lint xml
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint.xml 
        
      
    
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install type checker
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run mypy type checking
        run: |
          mypy calculator.py  | tee mypy.log

      - name: Save mypy log
        run: |
          echo "<mypy>" > mypy.xml
          sed 's/^/<line>/' mypy.log | sed 's/$/<\/line>/' >> mypy.xml
          echo "</mypy>" >> mypy.xml

      - name: Upload mypy xml
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy.xml

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit and radon
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit radon

      - name: Run pre-commit hooks
        run: pre-commit run --all-files | tee pre-commit.log

      - name: Save pre-commit log
        run: |
          echo "<precommit>" > precommit.xml
          sed 's/^/<line>/' precommit.log | sed 's/$/<\/line>/' >> precommit.xml
          echo "</precommit>" >> precommit.xml

      - name: Upload pre-commit xml
        uses: actions/upload-artifact@v4
        with:
          name: precommit-report
          path: precommit.xml

  solid-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solid-checker
      - name: Run Solid-Checker
        run: |
          solid-checker analyze . --format json > solid_report.json
      - name: Check Score Threshold
        run: |
          SCORE=$(jq '.overall_score' solid_report.json)
          if (( $(echo "$SCORE < 70" | bc -l) )); then
            echo "Code quality score too low: $SCORE"
            exit 1
